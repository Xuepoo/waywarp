name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: waywarp version
      description: Output of `waywarp --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: compositor
    attributes:
      label: Wayland Compositor
      options:
        - Hyprland
        - Sway
        - River
        - Wayfire
        - niri
        - Other
    validations:
      required: true

  - type: input
    id: compositor-version
    attributes:
      label: Compositor version
      description: e.g., Hyprland 0.55.2, sway 1.10
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `waywarp`
        2. Type "aa"
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error output
      description: Paste any relevant logs here
      render: shell
