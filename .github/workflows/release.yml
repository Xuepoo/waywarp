# Release pipeline for Rust CLI projects
# Triggers on version tags (v*) and handles:
#   - Cross-compilation for 8 targets (Linux/macOS/Windows × x86_64/aarch64)
#   - GitHub Release with checksums
#   - crates.io publish
#   - Homebrew tap update
#   - Scoop bucket update
#   - AUR package update
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT_NAME: waywarp

jobs:
  # ---------------------------------------------------------------------------
  # Build binaries for all supported targets
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - glibc
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          # Linux - musl (fully static)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # cross is needed for Linux cross-compilation (especially aarch64)
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Package archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            7z a ../../../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip \
              ${PROJECT_NAME}.exe
          else
            tar czf ../../../${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
              ${PROJECT_NAME}
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            sha256sum ${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip \
              > ${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
          else
            sha256sum ${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz \
              > ${PROJECT_NAME}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.target }}
          path: |
            ${{ env.PROJECT_NAME }}-*.tar.gz
            ${{ env.PROJECT_NAME }}-*.zip
            ${{ env.PROJECT_NAME }}-*.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish to crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ---------------------------------------------------------------------------
  # Update Homebrew tap
  # ---------------------------------------------------------------------------
  publish-homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP: Xuepoo/homebrew-tap
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Extract checksums
        id: checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Read SHA256 from checksum files
          SHA_LINUX=$(cat artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')
          SHA_MACOS_X86=$(cat artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          SHA_MACOS_ARM=$(cat artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')

          echo "sha_linux=${SHA_LINUX}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86=${SHA_MACOS_X86}" >> "$GITHUB_OUTPUT"
          echo "sha_macos_arm=${SHA_MACOS_ARM}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: /dev/stdin
          destination_repo: ${{ env.HOMEBREW_TAP }}
          destination_folder: Formula
          destination_branch_create: update-${{ env.PROJECT_NAME }}-${{ steps.checksums.outputs.version }}
          user_email: "github-actions[bot]@users.noreply.github.com"
          user_name: "github-actions[bot]"
          commit_message: "chore: update ${{ env.PROJECT_NAME }} to ${{ steps.checksums.outputs.version }}"

      # Alternative: direct push approach
      - name: Clone and update tap
        run: |
          VERSION="${{ steps.checksums.outputs.version }}"
          REPO_URL="https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${{ env.HOMEBREW_TAP }}.git"

          git clone "${REPO_URL}" tap
          cd tap

          cat > Formula/${PROJECT_NAME}.rb << 'FORMULA'
          class __PROJECT_NAME_CLASS__ < Formula
            desc "A high-performance keyboard-driven mouse control tool for Wayland compositors"
            homepage "https://github.com/Xuepoo/waywarp"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Xuepoo/waywarp/releases/download/vVERSION_PLACEHOLDER/waywarp-vVERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_ARM_PLACEHOLDER"
              else
                url "https://github.com/Xuepoo/waywarp/releases/download/vVERSION_PLACEHOLDER/waywarp-vVERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
                sha256 "SHA_MACOS_X86_PLACEHOLDER"
              end
            end

            on_linux do
              url "https://github.com/Xuepoo/waywarp/releases/download/vVERSION_PLACEHOLDER/waywarp-vVERSION_PLACEHOLDER-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "SHA_LINUX_PLACEHOLDER"
            end

            def install
              bin.install "waywarp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/waywarp --version")
            end
          end
          FORMULA

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/${PROJECT_NAME}.rb
          sed -i "s/SHA_MACOS_ARM_PLACEHOLDER/${{ steps.checksums.outputs.sha_macos_arm }}/g" Formula/${PROJECT_NAME}.rb
          sed -i "s/SHA_MACOS_X86_PLACEHOLDER/${{ steps.checksums.outputs.sha_macos_x86 }}/g" Formula/${PROJECT_NAME}.rb
          sed -i "s/SHA_LINUX_PLACEHOLDER/${{ steps.checksums.outputs.sha_linux }}/g" Formula/${PROJECT_NAME}.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/${PROJECT_NAME}.rb
          git commit -m "chore: update ${PROJECT_NAME} to ${VERSION}"
          git push

  # ---------------------------------------------------------------------------
  # Update Scoop bucket
  # ---------------------------------------------------------------------------
  publish-scoop:
    name: Update Scoop Bucket
    needs: release
    runs-on: ubuntu-latest
    env:
      SCOOP_BUCKET: Xuepoo/scoop-bucket
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Update Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_WIN=$(cat artifacts/${PROJECT_NAME}-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip.sha256 | awk '{print $1}')

          REPO_URL="https://x-access-token:${{ secrets.SCOOP_BUCKET_TOKEN }}@github.com/${{ env.SCOOP_BUCKET }}.git"
          git clone "${REPO_URL}" bucket
          cd bucket

          cat > bucket/${PROJECT_NAME}.json << EOF
          {
            "version": "${VERSION}",
            "description": "A high-performance keyboard-driven mouse control tool for Wayland compositors",
            "homepage": "https://github.com/Xuepoo/${PROJECT_NAME}",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/Xuepoo/${PROJECT_NAME}/releases/download/v${VERSION}/${PROJECT_NAME}-v${VERSION}-x86_64-pc-windows-msvc.zip",
                "hash": "${SHA_WIN}",
                "bin": "${PROJECT_NAME}.exe"
              }
            },
            "checkver": {
              "github": "https://github.com/Xuepoo/${PROJECT_NAME}"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/Xuepoo/${PROJECT_NAME}/releases/download/v\$version/${PROJECT_NAME}-v\$version-x86_64-pc-windows-msvc.zip"
                }
              }
            }
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/${PROJECT_NAME}.json
          git commit -m "chore: update ${PROJECT_NAME} to ${VERSION}"
          git push

  # ---------------------------------------------------------------------------
  # Update AUR package
  # ---------------------------------------------------------------------------
  publish-aur:
    name: Update AUR Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact checksum
        uses: actions/download-artifact@v4
        with:
          name: build-x86_64-unknown-linux-gnu
          path: artifacts

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: waywarp
          pkgbuild: |
            # Maintainer: Xuepoo <xuepoo@users.noreply.github.com>
            pkgname=waywarp
            pkgver=${GITHUB_REF_NAME#v}
            pkgrel=1
            pkgdesc="A high-performance keyboard-driven mouse control tool for Wayland compositors"
            arch=('x86_64')
            url="https://github.com/Xuepoo/waywarp"
            license=('MIT')
            depends=('gcc-libs')
            source=("${url}/releases/download/v${pkgver}/waywarp-v${pkgver}-x86_64-unknown-linux-gnu.tar.gz")
            sha256sums=('SKIP')

            package() {
              install -Dm755 "waywarp" "${pkgdir}/usr/bin/waywarp"
            }
          commit_username: Xuepoo
          commit_email: xuepoo@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "chore: update to ${{ github.ref_name }}"
