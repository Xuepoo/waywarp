# nFPM configuration file for generating deb, rpm and archlinux packages
name: "waywarp"
arch: "${ARCH}"
platform: "linux"
version: "${VERSION}"
release: "1"
section: "utils"
priority: "optional"
maintainer: "Xuepoo <xuepoo@users.noreply.github.com>"
description: "A high-performance keyboard-driven mouse control tool for Wayland compositors"
homepage: "https://github.com/Xuepoo/waywarp"
license: "MIT"

contents:
  - src: ${BINARY_SRC}
    dst: /usr/bin/waywarp
